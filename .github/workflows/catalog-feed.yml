name: catalog-feed

# RIDEJOB の Meta カタログフィードを microCMS から生成し、Vercel Blob の固定URLへ publish する定期ジョブ。
# Meta のカタログはその固定URLを 6h ごとに pull する（Commerce Manager のデータソースに登録）。
#
# 必要な Secrets（Settings → Secrets and variables → Actions）:
#   - NEXT_PUBLIC_MICROCMS_SERVICE_DOMAIN
#   - MICROCMS_API_KEY
#   - BLOB_READ_WRITE_TOKEN   (Vercel の Storage → Blob で発行)
#   - CATALOG_APPROVED_IMAGES_URL (ridejob-analytics の承認済み画像JSON API)
#   - CATALOG_FEED_TOKEN          (上記APIの読み取りトークン)
#   - CATALOG_GENERATE_API_URL    (ridejob-analytics の /api/ai/catalog-generate)
#   - CATALOG_GENERATE_TOKEN      (上記APIのBearer token)

on:
  schedule:
    - cron: '0 */6 * * *' # 6時間ごと（UTC）
  workflow_dispatch:
    inputs:
      force_regenerate_images:
        description: 既存キャッシュを無視して全カタログ画像を再生成する
        required: false
        default: false
        type: boolean

concurrency:
  group: catalog-feed
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Japanese fonts for catalog creatives
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk

      - name: Test catalog feed
        run: npm run test:catalog-feed

      - name: Generate & publish catalog feed
        run: npm run generate:catalog-feed
        env:
          NEXT_PUBLIC_MICROCMS_SERVICE_DOMAIN: ${{ secrets.NEXT_PUBLIC_MICROCMS_SERVICE_DOMAIN }}
          MICROCMS_API_KEY: ${{ secrets.MICROCMS_API_KEY }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          CATALOG_APPROVED_IMAGES_URL: ${{ secrets.CATALOG_APPROVED_IMAGES_URL }}
          CATALOG_FEED_TOKEN: ${{ secrets.CATALOG_FEED_TOKEN }}
          CATALOG_IMAGE_FORCE_REGENERATE: ${{ inputs.force_regenerate_images || 'false' }}
          CATALOG_ALLOW_GENERIC_IMAGE_FALLBACK: 'false'

      - name: Generate job-specific image candidates
        run: npm run generate:catalog-image-candidates
        env:
          CATALOG_GENERATE_API_URL: ${{ secrets.CATALOG_GENERATE_API_URL }}
          CATALOG_GENERATE_TOKEN: ${{ secrets.CATALOG_GENERATE_TOKEN }}
          CATALOG_IMAGE_GENERATION_LIMIT: '10'
          # The API generates sequentially and has a 300-second production runtime cap.
          CATALOG_IMAGE_GENERATION_BATCH_SIZE: '1'
          CATALOG_IMAGE_GENERATION_QUALITY: medium
